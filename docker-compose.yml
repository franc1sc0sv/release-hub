services:
  db:
    image: postgres:17-alpine
    container_name: release-hub-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: release-hub
      POSTGRES_PASSWORD: release-hub
      POSTGRES_DB: release-hub
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit:latest
    container_name: release-hub-mailpit
    restart: unless-stopped
    ports:
      - "1026:1025"
      - "8025:8025"

volumes:
  postgres_data:
